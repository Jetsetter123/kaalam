name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build
        run: npm run build

      - name: Create source archive
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next \
            -czf kaalaman-${{ github.ref_name }}.tar.gz .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: kaalaman-${{ github.ref_name }}.tar.gz
